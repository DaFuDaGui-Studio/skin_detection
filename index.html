<!DOCTYPE html>
<html lang="zh-Hant" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MUJI</title>
    <!-- Third-party tracking CDN -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-361YVPYLP7"></script>
    <script async src="https://connect.facebook.net/en_US/fbevents.js"></script>
    <script async src="https://s.yimg.jp/images/listing/tool/cv/lt.js"></script>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@100..900&display=swap" rel="stylesheet">


    <!-- Tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Alpine -->
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"
    ></script>

    <!-- Anime.js -->
    <script src="https://cdn.jsdelivr.net/npm/animejs/dist/bundles/anime.umd.min.js"></script>

    <style type="text/tailwindcss">
      @theme {
        --font-noto-sans-tc: "Noto Sans TC", sans-serif;
        --color-muji-white: #F2F1EE;
        --color-muji-ink: #3a3a3a;
        --color-muji-line: #d8d6d0;
        --color-muji-red: #7F0019;
      }

      :root {
        font-size: calc(100vw / 24.375); /* 全域等比縮放，390px 時 = 16px */
      }

      @media (min-width: 640px) {
        :root {
          font-size: 16px; /* 768px 以上：固定 1rem = 16px */
        }
      }

      @layer base {
        html {
          font-size: 16px;
          @apply font-noto-sans-tc;
        }
        body {
          @apply bg-[#e7e5e0];
          /* 電腦版時將固定尺寸的畫面置中 */
          @apply md:flex md:items-center md:justify-center md:min-h-screen;
        }
      }

      [x-cloak] {
        display: none;
      }

      @layer components {
        /* 主要按鈕 */
        .btn-primary {
          @apply inline-flex items-center justify-center w-full rounded-full bg-muji-ink text-muji-white
                 text-base tracking-widest py-4 transition-all duration-300
                 hover:bg-black active:scale-[0.97] cursor-pointer;
        }
        /* 選項按鈕 */
        .option {
          @apply flex items-center w-full text-left rounded-2xl border border-muji-line bg-white/70
                 px-5 py-4 text-[0.95rem] text-muji-ink transition-all duration-300
                 hover:border-muji-ink hover:bg-white hover:-translate-y-0.5 hover:shadow-md
                 active:scale-[0.98] cursor-pointer;
        }
        .option-index {
          @apply flex-none mr-4 grid place-items-center w-7 h-7 rounded-full border border-muji-line
                 text-xs text-[#9a978f] transition-colors duration-300;
        }
        .option:hover .option-index {
          @apply border-muji-ink text-muji-ink;
        }
        /* 進度點 */
        .dot {
          @apply h-1.5 rounded-full bg-muji-line transition-all duration-500;
        }
        .dot-active {
          @apply w-6 bg-muji-ink;
        }
        .dot-idle {
          @apply w-1.5;
        }
      }

      /* 浮動動畫 */
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-0.625rem); }
      }
      .animate-float { animation: float 4s ease-in-out infinite; }

      @keyframes float-slow {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-1rem) scale(1.04); }
      }
      .animate-float-slow { animation: float-slow 6s ease-in-out infinite; }

      /* animal-item 水中漂浮 */
      @keyframes float-water {
        0%, 100% { transform: translateY(0); }
        50%       { transform: translateY(-10px); }
      }
      .animal-item {
        animation: float-water 3s ease-in-out infinite;
      }
      #horse-item  { animation-delay: 0s; }
      #bird-item   { animation-delay: 0.6s; }
      #cat-item    { animation-delay: 1.2s; }
      #fish-item   { animation-delay: 0.3s; }
      #rabbit-item { animation-delay: 0.9s; }

      /* 跑馬燈 */
      .marquee {
        @apply w-full overflow-hidden pointer-events-none;
      }
      .marquee-track {
        @apply flex w-max;
      }
      .marquee-track img {
        @apply flex-none h-[6.625rem] w-auto max-w-none;
      }
      @keyframes marquee-left {
        from { transform: translateX(0); }
        to   { transform: translateX(-50%); }
      }
      @keyframes marquee-right {
        from { transform: translateX(-50%); }
        to   { transform: translateX(0); }
      }
      .animate-marquee-left  { animation: marquee-left 30s linear infinite; }
      .animate-marquee-right { animation: marquee-right 30s linear infinite; }

      /* 直書文字 */
      .vertical-text {
        writing-mode: vertical-rl;
        text-orientation: upright;
      }

      /* 星星閃光：縮放 + 閃爍 */
      @keyframes twinkle {
        0%, 100% { opacity: 0.35; transform: scale(0.7); }
        50%      { opacity: 1;    transform: scale(1.25); }
      }
      .animate-twinkle { animation: twinkle 1.8s ease-in-out infinite; }

      /* 按鈕：縮放脈動 */
      @keyframes pulse-scale {
        0%, 100% { transform: scale(1); }
        50%      { transform: scale(1.06); }
      }
      .animate-pulse-scale { animation: pulse-scale 1.6s ease-in-out infinite; }

      /* 雲霧向內飄至定點 */
      @keyframes drift-in-left {
        from { transform: translateX(-3.75rem); opacity: 0; }
        to   { transform: translateX(0);        opacity: 1; }
      }
      @keyframes drift-in-right {
        from { transform: translateX(3.75rem); opacity: 0; }
        to   { transform: translateX(0);    opacity: 1; }
      }
      .animate-drift-in-left {
        animation-name: drift-in-left;
        animation-duration: 2s;
        animation-timing-function: ease-out;
        animation-fill-mode: both;
      }
      .animate-drift-in-right {
        animation-name: drift-in-right;
        animation-duration: 2s;
        animation-timing-function: ease-out;
        animation-fill-mode: both;
      }

      /* 淡入 */
      @keyframes fade-in {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      .animate-fade-in {
        animation-name: fade-in;
        animation-duration: 1s;
        animation-timing-function: ease-out;
        animation-fill-mode: both;
      }

      /* 前導 → 問題一：走過橋的放大過場 */
      @keyframes bridge-bg-zoom {
        from { transform: scale(1); }
        to   { transform: scale(1.85); }
      }
      .animate-bridge-bg-zoom {
        animation: bridge-bg-zoom 1.2s ease-in forwards;
      }
      @keyframes bridge-zoom {
        from { transform: scale(1); }
        to   { transform: scale(2.4); }
      }
      .animate-bridge-zoom {
        transform-origin: 50% 100%;
        animation: bridge-zoom 1.2s ease-in forwards;
      }
      @keyframes fade-out-up {
        from { opacity: 1; transform: translateY(0); }
        to   { opacity: 0; transform: translateY(-1.25rem); }
      }
      .animate-fade-out-up {
        animation: fade-out-up 0.5s ease-in forwards;
      }

      /* ---- Line flowing animation ---- */
      @keyframes line-flow {
        0% {
          translate: -280px 280px;
          opacity: 0;
        }
        15% {
          opacity: var(--line-op, 1);
        }
        85% {
          opacity: var(--line-op, 1);
        }
        100% {
          translate: 280px -280px;
          opacity: 0;
        }
      }

      .line-vector {
        position: absolute;
        width: 164.22px;
        height: 3.02px;
        background: #fff;
        border-radius: 9999px;
        transform-origin: top left;
        transform: rotate(-44.82deg) scaleY(-1);
        animation: line-flow var(--dur, 4s) var(--del, 0s) ease-in-out infinite;
      }

      /* ---- Dot pop-scale-vanish animation ---- */
      @keyframes dot-pop {
        0% {
          scale: 0;
          opacity: 0;
        }
        10% {
          opacity: var(--dot-op, 1);
        }
        70% {
          opacity: var(--dot-op, 1);
        }
        100% {
          scale: 1.5;
          opacity: 0;
        }
      }

      .dot-circle {
        position: absolute;
        border-radius: 9999px;
        background: #fff;
        scale: 0;                /* ← 新增：初始隱藏 */
        opacity: 0;              /* ← 新增：初始隱藏 */
        animation: dot-pop var(--dur, 3s) var(--del, 0s) ease-out infinite backwards;
        /*                                                              ↑ 新增 */
      }

      /* ---- Heart pulse-spread-fadeout animation ---- */
      @keyframes heart-pulse {
        0% {
          scale: 0;
          opacity: 0;
        }
        10% {
          opacity: var(--h-op, 1);
        }
        70% {
          opacity: var(--h-op, 1);
        }
        100% {
          scale: 1.5;
          opacity: 0;
        }
      }

      .heart-wrap {
        position: absolute;
        transform-origin: top left;
        transform: rotate(21.75deg);
      }

      .heart-svg {
        transform-origin: center;
        scale: 0;
        opacity: 0;
        animation: heart-pulse var(--h-dur, 4s) var(--h-del, 0s) ease-out infinite backwards;
      }

      /* ---- Ring pulse-spread-fadeout animation ---- */
      @keyframes ring-pulse {
        0% {
          scale: 0;
          opacity: 0;
        }
        10% {
          opacity: var(--r-op, 1);
        }
        70% {
          opacity: var(--r-op, 1);
        }
        100% {
          scale: 1.5;
          opacity: 0;
        }
      }

      .circle-ring {
        position: absolute;
        border-radius: 9999px;
        border: 4px solid white;
        background: radial-gradient(circle at center, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 100%);
        scale: 0;
        opacity: 0;
        animation: ring-pulse var(--r-dur) var(--r-del) ease-out infinite backwards;
      }

      .beam {
        position: absolute;
        top: 0;
        left: 0;
        transform-origin: 0 0;
      }

      /* result 全白畫面轉場 */
      @keyframes circle-reveal {
        from { clip-path: circle(0 at 50% 10.6875rem); }
        to   { clip-path: circle(150% at 50% 10.6875rem); }
      }

      #result {
        clip-path: circle(0 at 50% 10.6875rem);
        animation: circle-reveal 1.0s ease-out 0.5s forwards;
      }

      /* 守護神剪影旋轉 */

      @keyframes spin {
        to { rotate: 1turn; }
      }

      .shadow-animal {
        animation: spin 4s linear infinite;
      }
    </style>
  </head>

  <body class="flex items-center justify-center h-[100dvh] w-screen">
    <!-- GA4 初始化 -->
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag('js', new Date());
    </script>

    <!-- Facebook Pixel 初始化 -->
    <script>
      !(function (f) {
        if (f.fbq) return;
        var n = (f.fbq = function () {
          n.callMethod ? n.callMethod.apply(n, arguments) : n.queue.push(arguments);
        });
        if (!f._fbq) f._fbq = n;
        n.push = n;
        n.loaded = !0;
        n.version = '2.0';
        n.queue = [];
      })(window);
    </script>

    <!-- LINE Ad 初始化 -->
    <script>
      window._ltq = window._ltq || [];
      window._lt =
        window._lt ||
        function () {
          window._ltq.push(arguments);
        };
    </script>

    <main
      x-data="quiz()"
      x-cloak
      class="relative sm:max-w-97.5 sm:max-h-172.5 h-full w-full pb-10 mx-auto my-auto bg-muji-white shadow-[0_0_60px_rgba(0,0,0,0.08)] overflow-hidden"
    >
      <!-- 畫面內容區 -->
      <div id="container" class="relative h-full mx-auto bg-white overflow-x-hidden overflow-y-auto"
        :class="screen !== 'result' ? '!overflow-y-hidden' : 'max-h-[100dvh] sm:max-h-162.5 overflow-x-hidden overflow-y-auto' ">

        <!-- ===== 開始畫面 ===== -->
        <section
          x-show="screen === 'start'"
          x-transition:enter="transition ease-out duration-500"
          x-transition:enter-start="opacity-0 translate-y-6"
          x-transition:enter-end="opacity-100 translate-y-0"
          class="absolute inset-0 flex flex-col items-center justify-center text-center bg-muji-white"
        >
          <!-- 底色材質（30% 透明度，疊在 muji-white 上） -->
          <div class="absolute inset-0 bg-[url('./assets/Background_Texture.jpg')] bg-cover bg-center opacity-30 pointer-events-none"></div>

          <!-- 上方跑馬燈：向右滑動 -->
          <div class="marquee absolute top-0 left-0">
            <div class="marquee-track animate-marquee-right">
              <picture>
                <source media="(min-width: 768px)" srcset="./assets/1_Animal Item_D.png">
                <img src="./assets/1_Animal Item.png" alt="">
              </picture>
              <picture>
                <source media="(min-width: 768px)" srcset="./assets/1_Animal Item_D.png">
                <img src="./assets/1_Animal Item.png" alt="">
              </picture>
            </div>
          </div>

          <!-- 中央：底圖 + 直書文字 + 按鈕（按鈕疊在圖片上） -->
          <div class="relative inline-block">
            <img src="./assets/1_Can Shape.png" alt="美肌守護神" class="w-[314px] h-[414px]">
            <!-- 直書標題：相對罐子圖片絕對置中 -->
            <h1 class="vertical-text absolute top-[54px] left-1/2 -translate-x-1/2 text-white text-[44px] font-black leading-[50px] tracking-[0.1em]
                      ">
              美肌守護神
            </h1>
            <!-- 星星：相對罐子圖片定位（左上 / 右下） -->
            <img src="./assets/1_Star.png" alt="" class="absolute top-[54px] left-[104px] w-[18px] h-[18px] animate-twinkle">
            <img src="./assets/1_Star.png" alt="" class="absolute bottom-[118px] right-[104px] w-[15px] h-[15px] animate-twinkle [animation-delay:0.9s]">
            <div class="absolute left-1/2 -translate-x-1/2 bottom-8 z-10">
              <button
                class="btn-primary !w-[8.75rem] h-[3.125rem] !py-0 !rounded-[0.625rem] overflow-hidden animate-pulse-scale
                       !text-muji-red font-black !text-[1.25rem] leading-[1.875rem] !tracking-[0.1em] !bg-white"
                @click="goIntro()"
              >
                <!-- 底色材質（30% 透明度，疊在白色上） -->
                <span class="absolute inset-0 bg-[url('./assets/Background_Texture.jpg')] bg-cover bg-center opacity-30 pointer-events-none"></span>
                <span class="relative inline-flex items-center">
                  開始祈願
                  <img src="./assets/1_Arrow 1.png" alt="" class="block self-center ml-[0.625rem] w-[0.625rem]">
                </span>
              </button>
            </div>
          </div>

          <!-- 下方跑馬燈：向左滑動 -->
          <div class="marquee absolute bottom-0 left-0">
            <div class="marquee-track animate-marquee-left">
              <picture>
                <source media="(min-width: 768px)" srcset="./assets/1_Animal Item_D.png">
                <img src="./assets/1_Animal Item.png" alt="">
              </picture>
              <picture>
                <source media="(min-width: 768px)" srcset="./assets/1_Animal Item_D.png">
                <img src="./assets/1_Animal Item.png" alt="">
              </picture>
            </div>
          </div>
        </section>

        <!-- ===== 前導畫面 ===== -->
        <section
          x-show="screen === 'intro'"
          class="absolute inset-0 flex flex-col items-center justify-center text-center bg-muji-white"
        >
          <!-- 底色材質（30% 透明度，疊在 muji-white 上） -->
          <div class="absolute inset-0 bg-[url('./assets/Background_Texture.jpg')] bg-cover bg-center opacity-30 pointer-events-none"></div>

          <!-- 橋背景（容器滿版且置中＝視窗中心，縮放整個容器 → 原地放大不位移） -->
          <div class="absolute inset-0 flex items-center justify-center pointer-events-none origin-center" :class="introLeaving && 'animate-bridge-bg-zoom'">
            <img src="./assets/2_Bridge-BG.png" alt="" class="relative top-[1.875rem] w-[200%] max-w-none flex-none animate-fade-in [animation-delay:0.7s]">
          </div>

          <!-- 白色覆蓋層（FFFFFF 75%） -->
          <div class="absolute inset-0 bg-white/75 pointer-events-none"></div>

          <!-- 橋（置中靠底，動畫只做 scale → 原地放大不位移） -->
          <div class="absolute inset-x-0 bottom-0 flex justify-center pointer-events-none">
            <img src="./assets/2_Bridge.png" alt="" class="w-[24.375rem] h-[22.5rem] flex-none origin-bottom" :class="introLeaving ? 'animate-bridge-zoom' : 'animate-fade-in [animation-delay:0.7s]'">
          </div>

          <!-- 底部白色線性漸層（下白 100% → 上白 0%） -->
          <div class="absolute bottom-0 left-0 right-0 h-[11.25rem] bg-gradient-to-t from-white to-transparent pointer-events-none"></div>

          <!-- 雲朵裝飾 -->
          <img src="./assets/2_Cloud_l.png" alt="" class="absolute left-0 top-[7.625rem] h-[5.0625rem] w-auto pointer-events-none" :class="introLeaving ? 'animate-fade-out-up' : 'animate-drift-in-left [animation-delay:2.7s]'">
          <img src="./assets/2_Cloud_r.png" alt="" class="absolute right-0 top-[2.6875rem] h-[5.6875rem] w-auto pointer-events-none" :class="introLeaving ? 'animate-fade-out-up' : 'animate-drift-in-right [animation-delay:2.7s]'">

          <div class="absolute top-[10.75rem] left-0 right-0 z-10 flex flex-col items-center" :class="introLeaving && 'animate-fade-out-up'">
            <p class="mb-12 text-[1.125rem] leading-[1.875rem] tracking-[0.1em] text-[#000000] animate-fade-in [animation-delay:1.7s]">
              <span class="font-medium">
                前方有一座美肌之池。<br/>
                據說，當你靜心祈願，<br/>
              </span>
              <span class="block mt-[1.4375rem] font-black">你的「美肌守護神」就會給予回應...</span>
            </p>
            <!-- 按鈕：雲出現後才淡入（外層負責淡入，按鈕本身維持脈動） -->
            <div class="animate-fade-in [animation-delay:1.7s]">
              <button class="btn-primary !w-[9.25rem] h-[3.125rem] !py-0 !rounded-[0.625rem] animate-pulse-scale font-black !text-[1.25rem] leading-[1.875rem] !tracking-[0.1em] !text-[#ffffff] !bg-[#000000]" @click="goQ1()">
                <img src="./assets/2_Arrow 1.png" alt="" class="block h-[0.625rem] w-auto mr-[0.625rem] -scale-x-100">
                繼續前進
                <img src="./assets/2_Arrow 1.png" alt="" class="block h-[0.625rem] w-auto ml-[0.625rem]">
              </button>
            </div>
          </div>
        </section>

        <!-- ===== 問題 1 ===== -->
        <section
          x-show="screen === 'q1'"
          class="absolute inset-0"
        >
          <!-- 水池背景 -->
          <img src="./assets/3_Water BG.png" alt="" class="absolute inset-0 w-full h-full object-cover pointer-events-none animate-fade-in [animation-delay:0.2s]">

          <!-- 染色背景（依所選顏色，初始透明，滌淨時淡入） -->
          <img id="wash-bg" x-show="washColor" :src="washColor ? washAssets[washColor].bg : ''" alt=""
               class="absolute inset-0 w-full h-full object-cover pointer-events-none opacity-0">

          <!-- 顏色圓形：自掌心擴散至全畫面（位於手、影片、木牌之下，底圖之上） -->
          <img id="wash-circle" x-show="washing" :src="washColor ? washAssets[washColor].circle : ''" alt=""
               class="absolute top-[250px] left-[134px] w-[180px] h-[180px] pointer-events-none opacity-0">

          <!-- 手（第 3 個淡入，疊在水池背景上一層） -->
          <img id="wash-hand" src="./assets/3_Hand.png" alt="" class="absolute bottom-0 left-0 w-auto pointer-events-none animate-fade-in [animation-delay:1.6s]">

          <!-- 木牌（第 1 個淡入，疊在手部圖片上一層；圖層 z-[6]，位於金幣之下） -->
          <img id="wash-wood" src="./assets/Wood.png" alt="" class="absolute top-[498px] left-0 w-auto pointer-events-none animate-fade-in [animation-delay:0.6s] z-[6]">

          <!-- 金幣（過場淡入；可向上滑動丟出。圖層 z-[7]，位於木頭之上、水面遮罩之下）
               外層為「可滑動感應區」，比金幣圖大一圈以便操作；金幣圖置中維持原尺寸與位置。 -->
          <div x-show="washColor && !coinThrown"
               @dragstart.prevent
               @pointerdown="coinDown($event)" @pointermove="coinMove($event)" @pointerup="coinUp($event)" @pointercancel="coinUp($event)"
               class="absolute top-[232px] left-1/2 -ml-[161px] w-[322px] h-[327px] flex items-center justify-center touch-none select-none z-[7]"
               :class="coinPhase && !coinThrown ? 'cursor-grab active:cursor-grabbing' : 'pointer-events-none'">
            <img id="wash-coin" src="./assets/4_Coin.png" alt="" draggable="false"
                 class="w-[222px] h-[207px] opacity-0 pointer-events-none select-none">
          </div>

          <!-- 金幣丟出動畫（用影片素材取代程式控制；丟出後才顯示並播放。圖層 z-[7]，與靜態金幣同層、水面遮罩之下）
               Apple/WebKit 用 HEVC .mov，其他用 WebM(VP9 alpha)，與其他動畫一致。
               畫布為正方形（金幣起始時置中、寬約畫布 53%），對齊靜態金幣位置：寬 416、置中、top 186 -->
          <video id="wash-coin-video" x-ref="washCoinVideo" x-show="coinThrown" muted playsinline preload="auto"
                 :src="washColor ? coinAnim[isApple ? 'mov' : 'video'] : ''"
                 class="absolute top-[186px] left-1/2 -ml-[208px] w-[416px] h-[416px] pointer-events-none select-none z-[7]"></video>

          <!-- 第二張背景（水面遮罩，top-355；圖層 z-[8]，介於金幣之上，金幣掉入時被其遮住） -->
          <img id="wash-water" x-show="waterFront" :src="washColor ? washAssets[washColor].bg : ''" alt=""
               class="absolute top-[355px] left-0 w-full h-auto pointer-events-none z-[8]">

    <!-- 檢測程式 -->

          // Q1 柄杓滌淨動態

          washAssets: {

            blue:   { video: './assets/3_Wash Blue.webm',   mov: './assets/3_Wash Blue.mov',   circle: './assets/3_Blue-Circle.png',     bg: './assets/Blue BG.png' },
            green:  { video: './assets/3_Wash Green.webm',  mov: './assets/3_Wash Green.mov',  circle: './assets/3_Green-Circle.png',    bg: './assets/Green BG.png' },
            orange: { video: './assets/3_Wash Orange.webm', mov: './assets/3_Wash Orange.mov', circle: './assets/3_Orange-Circle 1.png', bg: './assets/Orange BG.png' },
          },
          // 金幣丟出動畫素材（webm + mov，同滌淨動態的雙格式策略）
          coinAnim: { video: './assets/4_Coin Animation.webm', mov: './assets/4_Coin Animation.mov' },
          isApple: false,        // 是否為 Apple/WebKit（Safari、iOS）→ 用 HEVC .mov
          waterFront: false,     // 水面遮罩（第二張背景）是否顯示
          coinPhase: false,      // 金幣是否可滑動丟出
          coinTouched: false,    // 玩家是否已操作（用於提示詞淡出）
          coinThrown: false,     // 金幣是否已丟出
          _coinStartY: 0,        // 滑動起始 Y
          _coinDragging: false,  // 滑動進行中

          // Q2 水面動畫
          waterShape: null,
          questions: [
            // Q1 — 4 個選項
            ['pink', 'blue', 'green', 'orange'],
            // Q2 — 4 個選項
            ['line', 'circle', 'heart', 'ring'],
          ],
          results: [
            { 
              'name': '出雲駿馬',
              'animal': 'horse',
              'title': '清新臉部保養系列',

              ],

              'productImage': './assets/animal/horse/product.png',

              'activeImage': './assets/active/horse.png'
            },
            {

              'animal': 'bird',
              'title': '高濃度美容液系列',

              'list': [

              'activeImage': './assets/active/bird.png'
            },
            { 
              'name': '吉兆錦鯉',
              'animal': 'fish',
              'title': '水漾潤澤臉部保養系列',
              'subtitle': '賦予乾燥、適齡肌膚彈性與潤澤',
              'list': [
                '肌膚容易乾燥',

                '在意失去彈性的肌膚'
              ],
              'serials': '水漾潤澤臉部保養系列特集',
              'serialsLink': 'https://www.muji.tw/tw/feature/25aw/lustreglass/?utm_source=mujitw&utm_medium=muji-feature&utm_term=25aw-lustreglass ',
              'shareImage': './assets/animal/fish/share.jpg',
              'productImage': './assets/animal/fish/product.png',
              'serialsImage': './assets/animal/fish/product.png',
              'activeImage': './assets/active/fish.png'
            },
            {
              'name': '朝霞福貓',
              'animal': 'cat',
              'title': '米糠發酵臉部保養系列',
              'subtitle': '溫和滲透肌膚，打造彈性光澤肌',
              'list': [
                '在意肌膚暗沉',
                '想維持肌膚緊緻',
                '想要水潤光澤',
                '喜歡質地輕盈'
              ],
              'serials': '米糠發酵臉部保養系列特集',
              'serialsLink': 'https://www.muji.tw/tw/feature/24ss/ricebran/?utm_source=mujitw&utm_medium=muji-feature&utm_term=ricebran',
              'shareImage': './assets/animal/cat/share.jpg',
              'productImage': './assets/animal/cat/product.png',
              'serialsImage': './assets/animal/cat/product.png',
              'activeImage': './assets/active/cat.png'
            },
            {
              'name': '風間白兔',
              'animal': 'rabbit',
              'title': '敏感肌臉部保養系列',
              'subtitle': '低刺激性，專為敏感肌打造',
              'list': [
                '在意肌膚乾燥',
                '容易在季節交替時感到不適',
                '容易感到刺激'
              ],
              'serials': '敏感肌臉部保養系列特集',
              'serialsLink': 'https://www.muji.tw/tw/feature/25ss/sensitiveskin/?utm_source=mujitw&utm_medium=muji-feature&utm_term=sensitiveskin',
              'shareImage': './assets/animal/rabbit/share.jpg',
              'productImage': './assets/animal/rabbit/product.png',
              'serialsImage': './assets/animal/rabbit/product.png',
              'activeImage': './assets/active/rabbit.png'
            }
          ],

          init() {
            // Apple/WebKit（Safari 桌機與 iOS，含 iOS Chrome）→ 用 HEVC .mov（webm 透明在 WebKit 會變黑）
            this.isApple = /Apple/.test(navigator.vendor);
            // 拖拉罐
            anime.createDraggable('#active', {
              x: false,                                                                                             
              y: {                                                                                                  
                modifier: val => Math.max(0, val),                                                                  
              },   
              onRelease: (draggable) => {
                draggable.stop()
                // 取得當前 瀏覽器 height
                let viewportHeight = window.innerHeight || document.documentElement.clientHeight;
                if(viewportHeight > 690 && window.innerWidth >= 640) {
                  viewportHeight = 690; // 限制最大高度為 690px
                }
                const ratio = 180 / 690;
                const threshold = viewportHeight * ratio; // 計算閾值
                
                if (draggable.y > threshold) {
                  const translateRatio = 300 / 690
                  const translateY = viewportHeight * translateRatio
                  draggable.stop()
                  anime.animate('#drag_hint', { opacity: 0, duration: 1000, ease: 'easeInExpo' })
                  anime.animate('#active', {
                    translateY: translateY,
                    duration: 1000,
                    ease: 'easeInExpo',
                    onComplete: () => this.dragTransitionAnimation()
                  })
                }
              },                                                                                                   
            })
          },
          // 前導畫面 → 問題一：放大走過橋 → 文字按鈕淡出 → 畫面變白 → 問題一元素依序淡入
          goQ1() {
            this.introLeaving = true;          // 橋與池放大、開場文字與按鈕淡出
            setTimeout(() => {
              this.flash = true;               // 放大尾聲時白幕淡入，畫面變白
            }, 900);
            setTimeout(() => {
              this.screen = 'q1';              // 白幕下切換到問題一
              this.introLeaving = false;       // 還原前導狀態
              this.flash = false;              // 白幕淡出，問題一元素隨之依序淡入
            }, 1350);
          },
          // 開始畫面 → 前導畫面：先變白，再讓橋與文字淡入
          goIntro() {
            this.flash = true;                 // 白色覆蓋層淡入，畫面變白
            setTimeout(() => {
              this.screen = 'intro';           // 在白幕下切換到前導畫面
              this.flash = false;              // 白幕淡出，橋與文字隨之淡入
            }, 450);
          },
          // Q1 — 選擇柄杓：題目與選項淡出 → 播放倒水動態 → 顏色圓形擴散 + 背景染色 → 進入 Q2
          chooseWash(color) {
            if (this.washing) return;
            this.washColor = color;
            const bgUrl = `url(./assets/active/${this.washColor}_bg.png)`;
            document.getElementById('container').style.backgroundImage = bgUrl;
            this.washing = true;        // 觸發題目／選項淡出、顯示倒水動態
            this._washDone = false;
            // 柄杓選項淡出動畫（0.5s）結束後徹底移除，避免殘留圖層在滑金幣時被誤觸
            setTimeout(() => { this.optionsGone = true; }, 500);
            Alpine.nextTick(() => {
              const v = this.$refs.washVideo;
              if (v) {
                v.load();            // 來源（<source>）依顏色更新後需重新載入
                v.currentTime = 0;
                const p = v.play();
                if (p && p.catch) p.catch(() => {});
              }
              // 影片播放 1 秒後，顏色圓形開始擴散
              setTimeout(() => { this.washReveal(); }, 1000);
            });
          },
          // 顏色圓形自掌心擴散至全畫面、背景染成所選顏色，隨後進入 Q2
          washReveal() {
            if (this._washDone) return;
            this._washDone = true;
            anime.set('#wash-circle', { opacity: 1 });
            anime.animate('#wash-circle', { scale: [1, 6], opacity: [1, 0], duration: 1500, ease: 'easeInQuad' });
            anime.animate('#wash-bg', { opacity: [0, 1], duration: 900, ease: 'easeOutQuad', delay: 300 });
            // 圓形擴散後接續過場
            setTimeout(() => { this.washExit(); }, 1500);
          },
          // 過場第一階段：手往左、柄杓（影片）往右移出畫面
          washExit() {
            anime.animate('#wash-hand',  { translateX: '-110%', duration: 900, ease: 'easeInOutQuad' });
            anime.animate('#wash-video', {
              translateX: '110%', duration: 900, ease: 'easeInOutQuad',
              onComplete: () => { this.washEnter(); },
            });
          },
          // 過場第二階段：手與柄杓離開後，木頭上移就位、金幣淡入，隨後開放滑動
          washEnter() {
            anime.animate('#wash-wood', { translateY: -102, duration: 900, ease: 'easeOutQuad' });
            anime.animate('#wash-coin', {
              opacity: [0, 1], duration: 900, ease: 'easeOutQuad',
              onComplete: () => { this.coinPhase = true; },  // 開放滑動；3 秒未動作則顯示提示
            });
          },
          // 金幣：開始拖曳／滑動（滑鼠或手指皆透過 pointer 事件）
          coinDown(e) {
            if (!this.coinPhase || this.coinThrown) return;
            this._coinStartY = e.clientY;
            this._coinDragging = true;
            this.coinTouched = true;   // 玩家動作 → 提示詞淡出
            if (e.target.setPointerCapture) e.target.setPointerCapture(e.pointerId);
          },
          // 拖曳／滑動中：金幣只跟隨向上移動
          coinMove(e) {
            if (!this._coinDragging || this.coinThrown) return;
            const dy = Math.min(0, e.clientY - this._coinStartY);
            anime.set('#wash-coin', { translateY: dy });
          },
          // 放開：向上超過閾值則丟出，否則滑回原位
          coinUp(e) {
            if (!this._coinDragging || this.coinThrown) return;
            this._coinDragging = false;
            const dy = (e && e.clientY != null) ? e.clientY - this._coinStartY : 0;
            if (dy < -40) {
              this.throwCoin();
            } else {
              anime.animate('#wash-coin', { translateY: 0, duration: 300, ease: 'easeOutQuad' });
            }
          },
          // 金幣被拋擲出：木頭往下移出，金幣丟出動畫改用影片素材播放，落入水中後進入 Q2
          throwCoin() {
            if (this.coinThrown) return;
            this.coinThrown = true;     // 隱藏靜態金幣、改顯示動畫影片
            this.coinTouched = true;
            // 底部木頭往下移出畫面（先讓它可見地滑落，故水面遮罩稍後才出現）
            anime.animate('#wash-wood', { translateY: 400, duration: 800, ease: 'easeInQuad' });
            // 水面遮罩延後顯示：否則一出現就蓋住木頭（z-8 > z-6），看不到木頭下滑。
            // 約 0.5 秒時木頭已明顯下移、金幣也接近頂點開始下降，此時浮現水面、金幣沉入。
            setTimeout(() => { this.waterFront = true; }, 500);
            // 播放金幣丟出動畫（影片），落入水中（約 1.3 秒）後切換至 Q2
            let advanced = false;
            const toQ2 = () => {
              if (advanced) return;
              advanced = true;
              this.screen = 'q2';       // Q2 題目文字與選項出現
              this.washing = false;
            };
            this.$nextTick(() => {
              const v = this.$refs.washCoinVideo;
              if (v) {
                v.currentTime = 0;
                const p = v.play();
                if (p && p.catch) p.catch(() => {});  // 自動播放被擋仍照時間切換
              }
              // 金幣可見動畫約落在前 1.3 秒，餘為透明尾段，故以計時切換而非等整段影片結束
              setTimeout(toQ2, 1300);
            });
          },
          // 5. Water
          chooseWater(shape) {
            this.waterShape = shape;
            anime.animate('#q2-qa', {
              opacity: [1, 0],
              duration: 400,
              ease: 'easeOutQuad',
              onComplete: () => {
                document.getElementById('q2-qa').style.display = 'none';
                setTimeout(() => {
                  this.waterShape = shape;
                  setTimeout(() => {
                    // TODO #water-${shape} opacity 1->0 動畫，結束後進入 Q3
                    anime.animate(`#water-${shape}`, {
                      opacity: [1, 0],
                      duration: 800,
                      ease: 'easeOutQuad',
                      onComplete: () => {
                        this.screen = 'q3';
                      },
                    });
                  }, 3000);
                }, 500);
              },
            });
          },
          // 6. Hand
          moveHand(animal, optIndex) {
            this.resultAnimal = this.results[optIndex]['animal'];

            // 停止所有 animal-item 漂浮動畫
            document.querySelectorAll('.animal-item').forEach(el => {
              el.style.animation = 'none';
            });

            // 沒選到的item與題目淡出
            const fadeOuts = [
              ...document.querySelectorAll('.animal-item:not(#' + animal + '-item)'),
              document.getElementById('q3-question'),
            ];
            fadeOuts.forEach(el => {
              anime.animate(el, { opacity: [1, 0], duration: 400, ease: 'easeOutQuad',
                onComplete: () => { el.style.display = 'none'; }
              });
            });

            //手動往item移動動畫
            setTimeout(() => {
              const hand = document.getElementById('hand');
              const item = document.getElementById(`${animal}-item`);
              const parent = hand.parentElement;

              const handRect = hand.getBoundingClientRect();
              const itemRect = item.getBoundingClientRect();
              const parentRect = parent.getBoundingClientRect();

              const targetTop = itemRect.top - parentRect.top - 120;
              const currentTop = handRect.top - parentRect.top;
              const translateY = targetTop - currentTop;

              const itemCenterX = itemRect.left - parentRect.left + itemRect.width / 2;
              const handCenterX = handRect.left - parentRect.left + handRect.width / 2;
              const translateX = itemCenterX - handCenterX;

              anime.animate('#hand', {
                translateX,
                translateY,
                duration: 800,
                ease: 'easeOutQuad',
                onComplete: () => {
                  setTimeout(() => {
                    // 手淡出
                    anime.animate('#hand', { opacity: [1, 0], duration: 400, ease: 'easeOutQuad' });

                    // 被選到的 item 同時: 換圖、放大、移動、角度
                    const img = item.querySelector('img');
                    img.src = `./assets/active/${animal}.png`;

                    const targetWidth = 28.5 * 4; // w-28.5 = 114px
                    const itemRect2 = item.getBoundingClientRect();
                    const parentRect2 = parent.getBoundingClientRect();
                    const targetItemTop = 25 * 4; // top-25 = 100px
                    const targetItemLeft = parentRect2.width / 2 - targetWidth / 2; // 以新寬度置中
                    const deltaX = targetItemLeft - (itemRect2.left - parentRect2.left);
                    const deltaY = targetItemTop - (itemRect2.top - parentRect2.top);

                    anime.animate(item, {
                      translateX: deltaX,
                      translateY: deltaY,
                      ...(animal !== 'bird' && { rotate: -19 }),
                      duration: 1000,
                      ease: 'easeOutQuad',
                    });
                    anime.animate(img, {
                      width: [itemRect2.width, targetWidth],
                      duration: 1000,
                      ease: 'easeOutQuad',
                      onComplete: () => {
                        this.screen = 'drag';
                      }
                    });

                    setTimeout(() => {
                      // #item_can_back 跟 #item_can_front 同步移動到 -bottom-37
                      ['item_can_back', 'item_can_front'].forEach(id => {
                        const el = document.getElementById(id);
                        el.classList.remove('hidden');
                        anime.animate(el, {
                          bottom: ['-100%', `${-37 * 4}px`],
                          duration: 800,
                          ease: 'easeOutQuad',
                        });
                      });
                    }, 200)
                  }, 500)
                },
              });
            }, 500);
          },
          // 7. active - 拖進罐頭後轉場度動畫
          dragTransitionAnimation() {
            this.screen = 'spin'
            Alpine.nextTick(() => {
              requestAnimationFrame(() => {
                const can = document.getElementById('can_close')
                const section = can.parentElement
                const sectionRect = section.getBoundingClientRect()
                const canRect = can.getBoundingClientRect()

                const targetW = 75.5 * 4   // 302px
                const targetH = 70.25 * 4  // 281px

                const currentCX = canRect.left - sectionRect.left + canRect.width / 2
                const currentCY = canRect.top - sectionRect.top + canRect.height / 2
                const targetCX = sectionRect.width / 2
                const targetCY = sectionRect.height / 2
                
                anime.animate('#final_dark_bg', { opacity: 1, duration: 1500, ease: 'easeOutExpo' }) 
                anime.animate('#can_close', {
                  translateX: targetCX - currentCX,
                  translateY: targetCY - currentCY - targetH / 4,
                  width: targetW,
                  height: targetH,
                  duration: 1500,
                  ease: 'easeOutExpo',
                  onComplete: () => {
                    this.spinAnimation()
                  }
                })
              })
            })
          },

          // 8. final - 罐頭旋轉接白畫面轉場
          spinAnimation() {
            anime.animate('#spin_shadow', {
              opacity: 1,
              duration: 1000,
              ease: 'easeInExpo',
              onComplete: () => {
                setTimeout(() => {
                  anime.animate('#final_dark_bg', { 
                    opacity: 1,
                    duration: 500,
                    ease: 'easeOutExpo',
                    onComplete: () => {
                      this.flashAnimation()
                    }
                  })
                }, 100)
              }
            })
            anime.animate('#spin_shadow', {
              scale: 1.5,
              rotate: '0.5turn',
              duration: 2500,
              ease: 'easeInExpo',
            })
          },
          // 9. animal - 閃光白畫面轉場
          flashAnimation() {
            anime.set('#flash_outer', { scale: 0 })
            anime.set('#flash_inner', { scale: 0 })
            const beamTargets = {
              left_top:    { x: -900, y: -950 },
              left_middle: { x: -800, y: -50 },
              left_bottom: { x: -1200, y:  900 },
              right_top:   { x:  400, y: -1300 },
              right_middle:{ x:  500, y:  -1000 },
              right_bottom:{ x:  160, y:  340 },
            }
            
            anime.set('#final_flash .beam', { translateX: 195, translateY: 345, scale: 0 })

            // 先讓 #final_flash 從 opacity-0 變可見
            anime.animate('#final_flash', {
              opacity: 1,
              duration: 150,
              ease: 'linear',
              onComplete: () => {
                // 射線射出
                // 外圓（50% 透明）擴散
                anime.animate('#flash_outer', {
                  scale: 1,
                  duration: 1000,
                  ease: 'easeOutExpo',
                  delay: 100,
                })
                // 內圓（全白）擴散蓋滿畫面
                anime.animate('#flash_inner', {
                  scale: 1,
                  duration: 1200,
                  ease: 'easeOutQuart',
                  delay: 150,
                  onComplete: () => {
                    this.screen = 'result'
                  }
                })
                // 射線發射：比 flash_inner 晚開始，比他快結束
                const beams = document.querySelectorAll('#final_flash .beam')
                beams.forEach((beam) => {
                  const name = beam.getAttribute('src').split('/').pop().replace('.png', '')
                  const target = beamTargets[name]
                  if (!target) return
                  anime.animate(beam, {
                    translateX: target.x,
                    translateY: target.y,
                    scale: [0, 4],
                    duration: 600,
                    delay: 300,
                    ease: 'easeOutCubic',
                  })
                })
              }
            })
          },
          restart() {
            location.reload();
          },
          async webshare() {
            if (!navigator.share) { alert('您的瀏覽器不支援 Web Share API'); return; }
            try {
              const assetPath = this.results.find(item => item.animal === this.resultAnimal)?.shareImage
              const animalName = this.results.find(item => item.animal === this.resultAnimal)?.name
              const res = await fetch(assetPath);
              const blob = await res.blob();
              const file = new File([blob], 'muji-share.png', { type: blob.type });
              const shareData = {
                title: `我的美肌守護神是「${animalName}」！`,
                text: '快來測測你的守護神',
                url: window.location.href
              }
              const sharePayload = { ...shareData, url: window.location.href };
              if (navigator.canShare && navigator.canShare({ files: [file] })) sharePayload.files = [file];
              await navigator.share(sharePayload);
            } catch(e) { console.log('分享失敗', e); }
          },
        };
      }
    </script>

    <!-- 91APP Tracking SDK 初始化 + pageView -->
    <script>
      function waitForSdk(timeout = 5000) {
        return new Promise((resolve, reject) => {
          if (window.nineyi?.trackingSdk) return resolve();
          const timer = setTimeout(() => {
            clearInterval(poller);
            console.error('[Tracking] SDK timeout');
            reject();
          }, timeout);
          const poller = setInterval(() => {
            if (window.nineyi?.trackingSdk) {
              clearInterval(poller);
              clearTimeout(timer);
              resolve();
            }
          }, 50);
        });
      }

      function generateUUID() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
          var r = (Math.random() * 16) | 0,
            v = c === 'x' ? r : (r & 0x3) | 0x8;
          return v.toString(16);
        });
      }

      function checkIsLogin() {
        return document.cookie.split(';').some((c) => c.trim().startsWith('MID='));
      }

      const initializeConfig = {
        shopId: 41566,
        gaConfig: {
          countryName: 'tw',
          googleAnalyticsTrackingId: 'UA-78758030-19',
        },
        gaFourConfig: {
          googleAnalyticsFourGTagId: 'G-361YVPYLP7',
        },
        fbPixelConfig: {
          allSiteFbPixelId: '1021834927899745',
          customAudiencesPixelIds: ['343894544969170', '1497331951114241'],
        },
        lineAdConfig: {
          isEnableLineAd: true,
          tagEventSet: [
            {
              LineTagIdCode: '5b720194-cd05-457b-bfa9-e1e4ade431f6',
            },
          ],
        },
        adobeAAConfig: {
          isEnable: true,
        },
        currency: 'TWD',
        env: 'prod',
        market: 'tw',
        silo: '91app',
        locale: 'zh-TW',
      };

      async function initTracking() {
        try {
          await waitForSdk();
          console.log('[Tracking] SDK ready, initializing...');

          window.nineyi.trackingSdk.initialize(initializeConfig);
          console.log('[Tracking] SDK initialized');

          const eventId = generateUUID();
          setTimeout(() => {
            window.nineyi.trackingSdk.pageView(
              {
                viewType: 'MujiFeaturePage',
                pageTitle: '美肌守護神',
                viewId: 'feature-GodofSkin',
                isLogin: checkIsLogin(),
              },
              eventId,
              'TWD'
            );
            console.log('[Tracking] pageView sent for Product');
          }, 1000);
        } catch (e) {
          console.error('[Tracking] init failed:', e);
        }
      }

      document.addEventListener('DOMContentLoaded', initTracking);
    </script>
