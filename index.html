<!DOCTYPE html>
<html lang="zh-Hant" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>KD landing page</title>
    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@100..900&display=swap" rel="stylesheet">


    <!-- Tailwind -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Alpine -->
    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.8/dist/cdn.min.js"
    ></script>

    <style type="text/tailwindcss">
      @theme {
        --font-noto-sans-tc: "Noto Sans TC", sans-serif;
        --color-muji-white: #F2F1EE;
        --color-muji-ink: #3a3a3a;
        --color-muji-line: #d8d6d0;
        --color-muji-red: #7F0019;
      }

      @layer base {
        html {
          font-size: 16px;
          @apply font-noto-sans-tc;
        }
        body {
          @apply bg-[#e7e5e0];
          /* 電腦版時將固定尺寸的畫面置中 */
          @apply md:flex md:items-center md:justify-center md:min-h-screen;
        }
      }

      [x-cloak] {
        display: none;
      }

      @layer components {
        /* 主要按鈕 */
        .btn-primary {
          @apply inline-flex items-center justify-center w-full rounded-full bg-muji-ink text-muji-white
                 text-base tracking-widest py-4 transition-all duration-300
                 hover:bg-black active:scale-[0.97] cursor-pointer;
        }
        /* 選項按鈕 */
        .option {
          @apply flex items-center w-full text-left rounded-2xl border border-muji-line bg-white/70
                 px-5 py-4 text-[0.95rem] text-muji-ink transition-all duration-300
                 hover:border-muji-ink hover:bg-white hover:-translate-y-0.5 hover:shadow-md
                 active:scale-[0.98] cursor-pointer;
        }
        .option-index {
          @apply flex-none mr-4 grid place-items-center w-7 h-7 rounded-full border border-muji-line
                 text-xs text-[#9a978f] transition-colors duration-300;
        }
        .option:hover .option-index {
          @apply border-muji-ink text-muji-ink;
        }
        /* 進度點 */
        .dot {
          @apply h-1.5 rounded-full bg-muji-line transition-all duration-500;
        }
        .dot-active {
          @apply w-6 bg-muji-ink;
        }
        .dot-idle {
          @apply w-1.5;
        }
      }

      /* 浮動動畫 */
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      .animate-float { animation: float 4s ease-in-out infinite; }

      @keyframes float-slow {
        0%, 100% { transform: translateY(0) scale(1); }
        50% { transform: translateY(-16px) scale(1.04); }
      }
      .animate-float-slow { animation: float-slow 6s ease-in-out infinite; }

      /* 跑馬燈 */
      .marquee {
        @apply w-full overflow-hidden pointer-events-none;
      }
      .marquee-track {
        @apply flex w-max;
      }
      .marquee-track img {
        @apply flex-none h-[106px] w-auto max-w-none;
      }
      @keyframes marquee-left {
        from { transform: translateX(0); }
        to   { transform: translateX(-50%); }
      }
      @keyframes marquee-right {
        from { transform: translateX(-50%); }
        to   { transform: translateX(0); }
      }
      .animate-marquee-left  { animation: marquee-left 30s linear infinite; }
      .animate-marquee-right { animation: marquee-right 30s linear infinite; }

      /* 直書文字 */
      .vertical-text {
        writing-mode: vertical-rl;
        text-orientation: upright;
      }

      /* 星星閃光：縮放 + 閃爍 */
      @keyframes twinkle {
        0%, 100% { opacity: 0.35; transform: scale(0.7); }
        50%      { opacity: 1;    transform: scale(1.25); }
      }
      .animate-twinkle { animation: twinkle 1.8s ease-in-out infinite; }

      /* 按鈕：縮放脈動 */
      @keyframes pulse-scale {
        0%, 100% { transform: scale(1); }
        50%      { transform: scale(1.06); }
      }
      .animate-pulse-scale { animation: pulse-scale 1.6s ease-in-out infinite; }
    </style>
  </head>

  <body>
    <main
      x-data="quiz()"
      x-cloak
      class="relative mx-auto w-full max-w-[390px] min-h-screen md:min-h-0 md:h-[690px] flex flex-col bg-muji-white shadow-[0_0_60px_rgba(0,0,0,0.08)] overflow-hidden"
    >
      <!-- 畫面內容區 -->
      <div class="relative flex-1 flex flex-col justify-center">

        <!-- ===== 開始畫面 ===== -->
        <section
          x-show="screen === 'start'"
          x-transition:enter="transition ease-out duration-500"
          x-transition:enter-start="opacity-0 translate-y-6"
          x-transition:enter-end="opacity-100 translate-y-0"
          class="absolute inset-0 flex flex-col items-center justify-center text-center bg-muji-white"
        >
          <!-- 底色材質（30% 透明度，疊在 muji-white 上） -->
          <div class="absolute inset-0 bg-[url('./assets/Background_Texture.jpg')] bg-cover bg-center opacity-30 pointer-events-none"></div>

          <!-- 上方跑馬燈：向右滑動 -->
          <div class="marquee absolute top-0 left-0">
            <div class="marquee-track animate-marquee-right">
              <img src="./assets/1_Animal Item.png" alt="">
              <img src="./assets/1_Animal Item.png" alt="">
            </div>
          </div>

          <!-- 中央：底圖 + 直書文字 + 按鈕（按鈕疊在圖片上） -->
          <div class="relative inline-block">
            <img src="./assets/1_Can Shape.png" alt="美肌守護神" class="w-[314px] h-[414px]">
            <div class="absolute inset-0 flex items-center justify-center pb-16">
              <div class="relative">
                <!-- 左側、向上對齊 -->
                <img src="./assets/1_Star.png" alt="" class="absolute top-0 -left-7 w-[18px] h-[18px] animate-twinkle">
                <!-- 右側、向下對齊 -->
                <img src="./assets/1_Star.png" alt="" class="absolute bottom-0 -right-7 w-[15px] h-[15px] animate-twinkle [animation-delay:0.9s]">
                <h1 class="vertical-text text-white text-[44px] font-black leading-[50px] tracking-[0.1em]
                           drop-shadow-[0_1px_4px_rgba(0,0,0,0.25)]">
                  美肌守護神
                </h1>
              </div>
            </div>
            <div class="absolute left-1/2 -translate-x-1/2 bottom-8 z-10">
              <button
                class="btn-primary !w-[140px] h-[50px] !py-0 !rounded-[10px] overflow-hidden animate-pulse-scale
                       !text-muji-red font-black !text-[20px] leading-[30px] !tracking-[0.1em] !bg-white"
                @click="go('intro')"
              >
                <!-- 底色材質（30% 透明度，疊在白色上） -->
                <span class="absolute inset-0 bg-[url('./assets/Background_Texture.jpg')] bg-cover bg-center opacity-30 pointer-events-none"></span>
                <span class="relative inline-flex items-center">
                  開始祈願
                  <img src="./assets/1_Arrow 1.png" alt="" class="block self-center ml-[10px] w-[10px]">
                </span>
              </button>
            </div>
          </div>

          <!-- 下方跑馬燈：向左滑動 -->
          <div class="marquee absolute bottom-0 left-0">
            <div class="marquee-track animate-marquee-left">
              <img src="./assets/1_Animal Item.png" alt="">
              <img src="./assets/1_Animal Item.png" alt="">
            </div>
          </div>
        </section>

        <!-- ===== 前導畫面 ===== -->
        <section
          x-show="screen === 'intro'"
          x-transition:enter="transition ease-out duration-500 delay-100"
          x-transition:enter-start="opacity-0 translate-y-6"
          x-transition:enter-end="opacity-100 translate-y-0"
          class="text-center"
        >
          <div class="mb-10 animate-float">
            <div class="mx-auto grid place-items-center w-36 h-36 rounded-full bg-white/60 border border-muji-line">
              <span class="text-5xl">💧</span>
            </div>
          </div>
          <h2 class="text-xl font-medium text-muji-ink leading-relaxed mb-4">
            每一種肌膚<br/>都有屬於它的節奏
          </h2>
          <p class="text-sm text-[#7a776f] leading-loose mb-12">
            放鬆心情，憑直覺作答<br/>
            讓我們一起認識你的肌膚
          </p>
          <button class="btn-primary" @click="go('q1')">繼續前進</button>
        </section>

        <!-- ===== 問題 1 ===== -->
        <section
          x-show="screen === 'q1'"
          x-transition:enter="transition ease-out duration-500"
          x-transition:enter-start="opacity-0 translate-x-8"
          x-transition:enter-end="opacity-100 translate-x-0"
        >
          <p class="text-xs tracking-[0.3em] text-[#9a978f] mb-2">QUESTION 01</p>
          <h2 class="text-lg font-medium text-muji-ink leading-relaxed mb-8">
            你的肌膚平時<br/>給你的感覺是？
          </h2>
          <div class="space-y-3">
            <template x-for="(opt, i) in questions[0]" :key="i">
              <button class="option" @click="answer(0, i, 'q2')">
                <span class="option-index" x-text="String.fromCharCode(65 + i)"></span>
                <span x-text="opt"></span>
              </button>
            </template>
          </div>
        </section>

        <!-- ===== 問題 2 ===== -->
        <section
          x-show="screen === 'q2'"
          x-transition:enter="transition ease-out duration-500"
          x-transition:enter-start="opacity-0 translate-x-8"
          x-transition:enter-end="opacity-100 translate-x-0"
        >
          <p class="text-xs tracking-[0.3em] text-[#9a978f] mb-2">QUESTION 02</p>
          <h2 class="text-lg font-medium text-muji-ink leading-relaxed mb-8">
            一天結束後<br/>你的肌膚狀態？
          </h2>
          <div class="space-y-3">
            <template x-for="(opt, i) in questions[1]" :key="i">
              <button class="option" @click="answer(1, i, 'q3')">
                <span class="option-index" x-text="String.fromCharCode(65 + i)"></span>
                <span x-text="opt"></span>
              </button>
            </template>
          </div>
        </section>

        <!-- ===== 問題 3 ===== -->
        <section
          x-show="screen === 'q3'"
          x-transition:enter="transition ease-out duration-500"
          x-transition:enter-start="opacity-0 translate-x-8"
          x-transition:enter-end="opacity-100 translate-x-0"
        >
          <p class="text-xs tracking-[0.3em] text-[#9a978f] mb-2">QUESTION 03</p>
          <h2 class="text-lg font-medium text-muji-ink leading-relaxed mb-8">
            你最希望<br/>改善的肌膚問題是？
          </h2>
          <div class="space-y-3">
            <template x-for="(opt, i) in questions[2]" :key="i">
              <button class="option" @click="finish(i)">
                <span class="option-index" x-text="String.fromCharCode(65 + i)"></span>
                <span x-text="opt"></span>
              </button>
            </template>
          </div>
        </section>

        <!-- ===== 結果畫面 ===== -->
        <section
          x-show="screen === 'result'"
          x-transition:enter="transition ease-out duration-700"
          x-transition:enter-start="opacity-0 scale-95"
          x-transition:enter-end="opacity-100 scale-100"
          class="text-center"
        >
          <template x-if="screen === 'result'">
            <div>
              <p class="text-xs tracking-[0.3em] text-[#9a978f] mb-4">YOUR RESULT</p>
              <div class="mb-8 animate-float-slow">
                <div class="mx-auto grid place-items-center w-40 h-40 rounded-full border border-muji-line"
                     :style="`background-color:${results[resultIndex].color}`">
                  <span class="text-5xl" x-text="results[resultIndex].emoji"></span>
                </div>
              </div>
              <h2 class="text-2xl font-medium text-muji-ink mb-2" x-text="results[resultIndex].title"></h2>
              <p class="text-sm tracking-widest text-[#9a978f] mb-6" x-text="results[resultIndex].subtitle"></p>
              <p class="text-sm text-[#6f6c64] leading-loose mb-10 text-left bg-white/60 rounded-2xl border border-muji-line p-5"
                 x-text="results[resultIndex].desc"></p>
              <button class="btn-primary mb-3" @click="restart()">重新測驗</button>
            </div>
          </template>
        </section>

      </div>

      <!-- Footer -->
      <footer class="flex-none flex justify-between items-center py-2.5 px-7.5">
        <img src="./assets/logo.svg" alt="logo" class="w-auto h-3">
        <p class="leaing-2.5 text-[#787878] text-[0.375rem] text-right">Copyright©Ryohin Keikaku Co., Ltd. ©MUJI (Taiwan) Co., Ltd.<br/>
        All rights reserved.擁有及保留本網站所有權利。</p>
      </footer>
    </main>

    <script>
      function quiz() {
        return {
          screen: 'start',
          answers: [null, null, null],
          resultIndex: 0,

          questions: [
            // Q1 — 4 個選項
            ['緊繃、容易乾燥脫屑', '整天泛油、容易出油', 'T字泛油、兩頰偏乾', '偶爾泛紅、感覺敏感'],
            // Q2 — 4 個選項
            ['暗沉、沒有光澤', '出現細紋與疲態', '毛孔變得明顯', '容易冒痘、不穩定'],
            // Q3 — 5 個選項
            ['加強保濕鎖水', '控油與平衡', '緊緻與抗齡', '舒緩與鎮定', '提亮與淨白'],
          ],

          results: [
            {
              title: '保濕鎖水型',
              subtitle: 'HYDRATING',
              emoji: '💧',
              color: '#dce8ee',
              desc: '你的肌膚渴望水分，建議以溫和保濕為核心，疊加化妝水與乳液，幫助肌膚維持飽水與柔嫩，重建健康的水脂膜。',
            },
            {
              title: '控油平衡型',
              subtitle: 'BALANCING',
              emoji: '🍃',
              color: '#dde9dc',
              desc: '你的肌膚較易出油，重點在於清潔與水油平衡。選擇清爽不黏膩的保養，避免過度去油，讓肌膚回到舒適的平衡狀態。',
            },
            {
              title: '緊緻抗齡型',
              subtitle: 'FIRMING',
              emoji: '🌸',
              color: '#f0e0e6',
              desc: '你的肌膚需要彈力與緊緻照護。可加入精華與按摩，搭配充足保濕，喚醒肌膚的飽滿與光澤，留住年輕的輪廓。',
            },
            {
              title: '舒緩鎮定型',
              subtitle: 'SOOTHING',
              emoji: '🌿',
              color: '#e3ebd9',
              desc: '你的肌膚較為敏感，需要溫和與鎮定。挑選成分單純、無多餘負擔的保養，減少刺激，讓肌膚在安心中慢慢變強壯。',
            },
            {
              title: '提亮淨白型',
              subtitle: 'BRIGHTENING',
              emoji: '✨',
              color: '#f1ead6',
              desc: '你的肌膚追求透亮與均勻，建議做好防曬並適度提亮保養，由內而外點亮膚色，找回自然清透的好氣色。',
            },
          ],

          // 進度：在問答階段顯示
          get showProgress() {
            return ['q1', 'q2', 'q3'].includes(this.screen);
          },
          get currentQuestion() {
            return { q1: 1, q2: 2, q3: 3 }[this.screen] || 0;
          },

          go(target) {
            this.screen = target;
          },
          answer(qIndex, optIndex, next) {
            this.answers[qIndex] = optIndex;
            this.screen = next;
          },
          finish(optIndex) {
            this.answers[2] = optIndex;
            // 第三題（5 個選項）對應 5 種結果
            this.resultIndex = optIndex;
            this.screen = 'result';
          },
          restart() {
            this.answers = [null, null, null];
            this.resultIndex = 0;
            this.screen = 'start';
          },
        };
      }
    </script>
  </body>
 </html>
